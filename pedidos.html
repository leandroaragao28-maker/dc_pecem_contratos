<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — DC Pecém</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Barra de resumo */
    .ped-sumario { display:none; background:#fff; border:1px solid var(--cor-borda); border-radius:var(--raio); padding:10px 0; margin-bottom:12px; overflow-x:auto; }
    .sum-item { flex:1; min-width:110px; padding:4px 16px; border-right:1px solid var(--cor-borda); }
    .sum-item:last-child { border-right:none; }
    .sum-label { font-size:0.65rem; color:var(--cor-texto-m); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
    .sum-val { font-size:0.95rem; font-weight:700; color:var(--cor-primaria); }

    /* Barra de filtros */
    .filtro-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:12px; }

    /* Lista de cards */
    .ped-lista { display:flex; flex-direction:column; gap:8px; }
    .ped-card { background:#fff; border:1px solid var(--cor-borda); border-radius:var(--raio); padding:12px 16px;
                display:grid; grid-template-columns:1fr 210px 150px; gap:16px; align-items:center;
                transition:border-color .15s, box-shadow .15s; }
    .ped-card:hover { border-color:var(--cor-acento); box-shadow:0 2px 8px rgba(37,99,235,0.1); }
    .ped-card > div:first-child { min-width:0; }
    .ped-num  { font-size:0.67rem; color:var(--cor-texto-m); margin-bottom:2px; }
    .ped-desc a { font-size:0.86rem; font-weight:600; color:var(--cor-primaria); text-decoration:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
    .ped-desc a:hover { text-decoration:underline; }
    .ped-meta { display:flex; align-items:center; gap:8px; font-size:0.69rem; color:var(--cor-texto-m); margin-top:4px; flex-wrap:wrap; }
    .ped-brow { display:grid; grid-template-columns:58px 1fr 36px; align-items:center; gap:6px; padding:2px 0; }
    .ped-blbl { font-size:0.63rem; color:var(--cor-texto-m); }
    .ped-bw   { background:#e8edf2; border-radius:99px; height:5px; overflow:hidden; }
    .ped-b    { height:100%; background:var(--cor-acento); border-radius:99px; }
    .ped-bpct { font-size:0.62rem; color:var(--cor-texto-m); text-align:right; }
    .ped-r    { text-align:right; }
    .ped-valor { font-size:0.88rem; font-weight:700; color:var(--cor-primaria); margin-bottom:6px; }
    .ped-acoes { display:flex; gap:4px; justify-content:flex-end; }

    @media (max-width:860px) { .ped-card { grid-template-columns:1fr auto; } .ped-bars { display:none; } }
    @media (max-width:480px) { .ped-card { grid-template-columns:1fr; } .ped-r { text-align:left; } .ped-acoes { justify-content:flex-start; } }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E3A5F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DC Pecém">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="pagina">

  <header>
    <div>
      <div style="font-size:0.78rem;opacity:0.75;margin-bottom:2px;">🏗️ DC Pecém — Contratos</div>
      <h1>Pedidos</h1>
    </div>
    <button class="btn btn-primario" style="background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);" onclick="abrirModalNovo()">
      + Novo pedido
    </button>
  </header>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="pedidos.html" class="ativo">Pedidos</a>
    <a href="avanco.html">Avançar</a>
    <a href="fat-direto.html">Fat. Direto</a>
    <a href="importacao.html">Importar</a>
    <a href="#" onclick="sair(event)">Sair</a>
  </nav>

  <main>
    <!-- Barra de resumo -->
    <div id="sumario" class="ped-sumario"></div>

    <!-- Filtros -->
    <div class="filtro-bar">
      <div class="flex gap-8" style="flex-wrap:wrap;" id="filtros">
        <button class="btn btn-secundario btn-sm filtro ativo" data-status="todos">Todos</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="em negociação">Em negociação</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="aguardando pedido">Aguardando pedido</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="pedido emitido">Pedido emitido</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="concluído">Concluído</button>
      </div>
      <div class="flex gap-8 ai-center">
        <select id="filtro-responsavel" onchange="renderTabela()"
                style="font-size:0.8rem;padding:5px 10px;border:1px solid var(--cor-borda);border-radius:var(--raio);background:white;cursor:pointer;height:30px;">
          <option value="">Todos responsáveis</option>
        </select>
        <input type="search" id="busca" placeholder="Buscar…"
               style="width:190px;" oninput="renderTabela()">
      </div>
    </div>

    <!-- Lista de pedidos -->
    <div id="lista-pedidos" class="ped-lista">
      <div class="estado-msg">Carregando…</div>
    </div>
  </main>

  <!-- Modal pedido -->
  <div class="modal-overlay" id="modal-pedido">
    <div class="modal">
      <div class="modal-titulo" id="modal-titulo">Novo pedido</div>
      <form id="form-pedido" onsubmit="salvarPedido(event)">
        <input type="hidden" id="f-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-grupo" style="grid-column:1/-1;">
            <label>Descrição</label>
            <input type="text" id="f-descricao" required placeholder="Descrição do pedido">
          </div>
          <div class="form-grupo">
            <label>Nº pedido SAP</label>
            <input type="text" id="f-num-sap" placeholder="Ex.: 4500012345">
          </div>
          <div class="form-grupo">
            <label>Valor contratado (R$)</label>
            <input type="number" id="f-valor" min="0" step="0.01" placeholder="0,00">
          </div>
          <div class="form-grupo">
            <label>% Retenção</label>
            <input type="number" id="f-retencao" min="0" max="100" step="0.01" placeholder="Ex.: 5">
          </div>
          <div class="form-grupo">
            <label>Status</label>
            <select id="f-status">
              <option value="em negociação">Em negociação</option>
              <option value="aguardando pedido">Aguardando pedido</option>
              <option value="pedido emitido">Pedido emitido</option>
              <option value="concluído">Concluído</option>
            </select>
          </div>
          <div class="form-grupo">
            <label>Data de emissão</label>
            <input type="date" id="f-data-emissao">
          </div>
          <div class="form-grupo">
            <label>Data de início</label>
            <input type="date" id="f-data-inicio">
          </div>
          <div class="form-grupo">
            <label>Término previsto</label>
            <input type="date" id="f-termino">
          </div>
          <div class="form-grupo">
            <label>Responsável / Gestor</label>
            <input type="text" id="f-responsavel" placeholder="Ex.: João Silva">
          </div>
          <div class="form-grupo">
            <label>Teto Fat. Direto (R$)</label>
            <input type="number" id="f-teto-fat-direto" min="0" step="0.01" placeholder="0,00">
          </div>
          <div class="form-grupo" style="grid-column:1/-1;">
            <label>Escopo Detalhado</label>
            <textarea id="f-escopo" rows="3" placeholder="Serviços, fornecimentos ou atividades contemplados…"></textarea>
          </div>
        </div>
        <div class="modal-acoes">
          <button type="button" class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn btn-primario" id="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal confirmação exclusão -->
  <div class="modal-overlay" id="modal-excluir">
    <div class="modal" style="max-width:400px;text-align:center;">
      <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
      <div class="modal-titulo">Excluir pedido?</div>
      <p class="txt-muted" style="margin-bottom:8px;">O pedido será movido para a aba "Excluídos" na planilha.</p>
      <p class="txt-muted">Esta ação não pode ser desfeita pelo sistema.</p>
      <div class="modal-acoes" style="justify-content:center;">
        <button class="btn btn-secundario" onclick="fecharModalExcluir()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const BADGES = {
      "em negociação":    "badge badge-neg",
      "aguardando pedido":"badge badge-ag",
      "pedido emitido":   "badge badge-em",
      "concluído":        "badge badge-ok",
    };
    const STATUS_ABREV = {
      "em negociação":    "EN",
      "aguardando pedido":"AP",
      "pedido emitido":   "PE",
      "concluído":        "C",
    };

    let pedidos = [];
    let filtroAtivo = "todos";
    let idExcluir = null;

    // ── Init ───────────────────────────────────────────────
    if (!estaAutenticado()) location.href = "login.html";

    document.querySelectorAll(".filtro").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filtro").forEach(b => b.classList.remove("ativo"));
        btn.classList.add("ativo");
        filtroAtivo = btn.dataset.status;
        renderTabela();
      });
    });

    carregarPedidos();

    async function carregarPedidos() {
      try {
        const res = await API.pedidos();
        pedidos = res.dados || [];
        popularFiltroResponsavel();
        renderTabela();
      } catch (e) {
        document.getElementById("lista-pedidos").innerHTML =
          `<div class="estado-msg" style="color:#dc2626;">Erro ao carregar: ${e.message}</div>`;
      }
    }

    function popularFiltroResponsavel() {
      const resp = [...new Set(pedidos.map(p => p.responsavel).filter(Boolean))].sort();
      const sel  = document.getElementById("filtro-responsavel");
      const val  = sel.value;
      sel.innerHTML = `<option value="">Todos responsáveis</option>` +
        resp.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("");
      if (val) sel.value = val;
    }

    // ── Lista de pedidos ───────────────────────────────────
    const _iUser = `<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="#9ca3af" stroke-width="1.4"/><path d="M2.5 14c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/></svg>`;
    const _dotC  = {"em negociação":"#f59e0b","aguardando pedido":"#9ca3af","pedido emitido":"var(--cor-acento)","concluído":"#16a34a"};

    function renderTabela() {
      const busca      = (document.getElementById("busca").value || "").toLowerCase();
      const filtroResp = document.getElementById("filtro-responsavel").value;
      const lista = pedidos.filter(p => {
        const passaFiltro = filtroAtivo === "todos" || p.status === filtroAtivo;
        const passaResp   = !filtroResp || (p.responsavel || "") === filtroResp;
        const passaBusca  = !busca ||
          (p.descricao || "").toLowerCase().includes(busca) ||
          String(p.num_pedido_sap || "").toLowerCase().includes(busca) ||
          fmtNumPed(p.num_pedido_sap).includes(busca);
        return passaFiltro && passaResp && passaBusca;
      });

      renderSumario(lista);

      const el = document.getElementById("lista-pedidos");
      if (!lista.length) {
        el.innerHTML = `<div class="estado-msg">Nenhum pedido encontrado.</div>`;
        return;
      }

      el.innerHTML = lista.map(p => {
        const base    = num(p.valor);
        const pctExec = base > 0 ? (num(p.executado)     / base * 100) : 0;
        const pctMed  = base > 0 ? (num(p.medido)        / base * 100) : 0;
        const pctFat  = base > 0 ? (num(p.faturadoBruto) / base * 100) : 0;
        const dotCor  = _dotC[p.status] || "#9ca3af";
        return `
          <div class="ped-card">
            <div>
              <div class="ped-num">#${p.id}${p.num_pedido_sap ? " · " + fmtNumPed(p.num_pedido_sap) : ""}</div>
              <div class="ped-desc"><a href="pedido.html?id=${p.id}" title="${esc(p.descricao)}">${esc(p.descricao)}</a></div>
              <div class="ped-meta">
                ${p.responsavel ? `${_iUser} <span>${esc(p.responsavel)}</span>` : ""}
                <span style="display:flex;align-items:center;gap:4px;">
                  <span style="width:7px;height:7px;border-radius:50%;background:${dotCor};display:inline-block;flex-shrink:0;"></span>
                  ${p.status || "—"}
                </span>
              </div>
            </div>
            <div class="ped-bars">
              ${pedBarRow("Executado", pctExec)}
              ${pedBarRow("Medido",    pctMed)}
              ${pedBarRow("Faturado",  pctFat)}
            </div>
            <div class="ped-r">
              <div class="ped-valor">${fmtBRL(p.valor)}</div>
              <div class="ped-acoes">
                <button class="btn btn-secundario btn-sm" onclick="abrirModalEditar(${p.id})" title="Editar">✏️</button>
                <button class="btn btn-secundario btn-sm" onclick="pedirExclusao(${p.id})" title="Excluir">🗑️</button>
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function renderSumario(lista) {
      const el = document.getElementById("sumario");
      if (!lista.length) { el.style.display = "none"; return; }
      const totVal  = lista.reduce((s, p) => s + num(p.valor),          0);
      const totExec = lista.reduce((s, p) => s + num(p.executado),       0);
      const totMed  = lista.reduce((s, p) => s + num(p.medido),          0);
      const totFat  = lista.reduce((s, p) => s + num(p.faturadoBruto),   0);
      el.style.display = "flex";
      el.innerHTML = `
        <div class="sum-item"><div class="sum-label">Contratos</div><div class="sum-val">${lista.length}</div></div>
        <div class="sum-item"><div class="sum-label">Valor total</div><div class="sum-val">${fmtBRL(totVal)}</div></div>
        <div class="sum-item"><div class="sum-label">Executado</div><div class="sum-val">${fmtBRL(totExec)}</div></div>
        <div class="sum-item"><div class="sum-label">Medido</div><div class="sum-val">${fmtBRL(totMed)}</div></div>
        <div class="sum-item"><div class="sum-label">Faturado</div><div class="sum-val">${fmtBRL(totFat)}</div></div>
      `;
    }

    function pedBarRow(label, pct) {
      const w = Math.max(0, Math.min(100, pct));
      return `
        <div class="ped-brow">
          <span class="ped-blbl">${label}</span>
          <div class="ped-bw"><div class="ped-b" style="width:${w}%"></div></div>
          <span class="ped-bpct">${pct.toFixed(1)}%</span>
        </div>`;
    }

    // ── Modal novo / editar ────────────────────────────────
    function abrirModalNovo() {
      document.getElementById("modal-titulo").textContent = "Novo pedido";
      document.getElementById("form-pedido").reset();
      document.getElementById("f-id").value = "";
      document.getElementById("modal-pedido").classList.add("aberto");
    }

    function abrirModalEditar(id) {
      const p = pedidos.find(x => String(x.id) === String(id));
      if (!p) return;
      document.getElementById("modal-titulo").textContent = "Editar pedido";
      document.getElementById("f-id").value            = p.id;
      document.getElementById("f-descricao").value     = p.descricao || "";
      document.getElementById("f-num-sap").value       = p.num_pedido_sap || "";
      document.getElementById("f-valor").value         = p.valor || "";
      document.getElementById("f-retencao").value      = p.perc_retencao || "";
      document.getElementById("f-status").value        = p.status || "em negociação";
      document.getElementById("f-data-emissao").value      = isoData(p.data_emissao);
      document.getElementById("f-data-inicio").value        = isoData(p.data_inicio);
      document.getElementById("f-termino").value            = isoData(p.termino_previsto);
      document.getElementById("f-responsavel").value        = p.responsavel || "";
      document.getElementById("f-teto-fat-direto").value    = p.valor_teto_fat_direto || "";
      document.getElementById("f-escopo").value             = p.escopo_detalhado || "";
      document.getElementById("modal-pedido").classList.add("aberto");
    }

    function fecharModal() {
      document.getElementById("modal-pedido").classList.remove("aberto");
    }

    async function salvarPedido(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-salvar");
      btn.disabled = true;
      btn.textContent = "Salvando…";
      try {
        const dados = {
          id:              document.getElementById("f-id").value || null,
          descricao:       document.getElementById("f-descricao").value,
          num_pedido_sap:  document.getElementById("f-num-sap").value,
          valor:           parseFloat(document.getElementById("f-valor").value) || 0,
          perc_retencao:   parseFloat(document.getElementById("f-retencao").value) || 0,
          status:          document.getElementById("f-status").value,
          data_emissao:    document.getElementById("f-data-emissao").value,
          data_inicio:     document.getElementById("f-data-inicio").value,
          termino_previsto:      document.getElementById("f-termino").value,
          responsavel:           document.getElementById("f-responsavel").value,
          valor_teto_fat_direto: parseFloat(document.getElementById("f-teto-fat-direto").value) || 0,
          escopo_detalhado:      document.getElementById("f-escopo").value,
        };
        await API.salvarPedido(dados);
        fecharModal();
        await carregarPedidos();
      } catch (err) {
        alert("Erro ao salvar: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Salvar";
      }
    }

    // ── Exclusão ───────────────────────────────────────────
    function pedirExclusao(id) {
      idExcluir = id;
      document.getElementById("modal-excluir").classList.add("aberto");
    }

    function fecharModalExcluir() {
      idExcluir = null;
      document.getElementById("modal-excluir").classList.remove("aberto");
    }

    async function confirmarExclusao() {
      if (!idExcluir) return;
      try {
        await API.excluirPedido(idExcluir);
        fecharModalExcluir();
        await carregarPedidos();
      } catch (err) {
        alert("Erro ao excluir: " + err.message);
      }
    }

    // ── Sair ───────────────────────────────────────────────
    function sair(e) {
      e.preventDefault();
      clearToken();
      location.href = "login.html";
    }

    // ── Utilitários ────────────────────────────────────────
    function num(v) { return parseFloat(v) || 0; }
    function fmtBRL(v) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number(v) || 0);
    }
    function brl(v) {
      const n = new Intl.NumberFormat("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Number(v) || 0);
      return `<div class="val-brl"><span class="s">R$</span><span class="n">${n}</span></div>`;
    }
    function fmtNumPed(v) {
      const s = String(v || "").trim();
      if (!s) return "—";
      return /^\d+$/.test(s) ? s.padStart(6, "0") : s;
    }
    function fmtData(v) {
      if (!v) return "—";
      const d = new Date(v);
      if (isNaN(d)) return v;
      return d.toLocaleDateString("pt-BR");
    }
    function isoData(v) {
      if (!v) return "";
      const d = new Date(v);
      if (isNaN(d)) return "";
      return d.toISOString().slice(0, 10);
    }
    function esc(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Fechar modal clicando fora
    document.getElementById("modal-pedido").addEventListener("click", function(e) {
      if (e.target === this) fecharModal();
    });
    document.getElementById("modal-excluir").addEventListener("click", function(e) {
      if (e.target === this) fecharModalExcluir();
    });
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
