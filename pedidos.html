<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — DC Pecém</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pagina">

  <header>
    <div>
      <div style="font-size:0.78rem;opacity:0.75;margin-bottom:2px;">DC Pecém — Contratos</div>
      <h1>Pedidos</h1>
    </div>
    <button class="btn btn-primario" style="background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);" onclick="abrirModalNovo()">
      + Novo pedido
    </button>
  </header>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="pedidos.html" class="ativo">Pedidos</a>
    <a href="#" onclick="sair(event)">Sair</a>
  </nav>

  <main>
    <!-- Filtros -->
    <div class="flex gap-12 ai-center mb-24" style="flex-wrap:wrap;">
      <div class="flex gap-8" id="filtros">
        <button class="btn btn-secundario btn-sm filtro ativo" data-status="todos">Todos</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="em negociação">Em negociação</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="aguardando pedido">Aguardando pedido</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="pedido emitido">Pedido emitido</button>
        <button class="btn btn-secundario btn-sm filtro" data-status="concluído">Concluído</button>
      </div>
      <input type="search" id="busca" placeholder="Buscar por descrição ou nº SAP…"
             style="width:260px;margin-left:auto;" oninput="renderTabela()">
    </div>

    <!-- Tabela -->
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="tabela-wrap">
        <table id="tbl-pedidos">
          <thead>
            <tr>
              <th style="width:60px;">ID</th>
              <th style="width:120px;">Nº SAP</th>
              <th>Descrição</th>
              <th style="width:130px;" class="num">Valor contratado</th>
              <th style="width:130px;">Status</th>
              <th style="width:80px;">Término</th>
              <th style="width:80px;"></th>
            </tr>
          </thead>
          <tbody id="corpo-tabela">
            <tr><td colspan="7" class="estado-msg">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal pedido -->
  <div class="modal-overlay" id="modal-pedido">
    <div class="modal">
      <div class="modal-titulo" id="modal-titulo">Novo pedido</div>
      <form id="form-pedido" onsubmit="salvarPedido(event)">
        <input type="hidden" id="f-id">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-grupo" style="grid-column:1/-1;">
            <label>Descrição</label>
            <input type="text" id="f-descricao" required placeholder="Descrição do pedido">
          </div>
          <div class="form-grupo">
            <label>Nº pedido SAP</label>
            <input type="text" id="f-num-sap" placeholder="Ex.: 4500012345">
          </div>
          <div class="form-grupo">
            <label>Valor contratado (R$)</label>
            <input type="number" id="f-valor" min="0" step="0.01" placeholder="0,00">
          </div>
          <div class="form-grupo">
            <label>% Retenção</label>
            <input type="number" id="f-retencao" min="0" max="100" step="0.01" placeholder="Ex.: 5">
          </div>
          <div class="form-grupo">
            <label>Status</label>
            <select id="f-status">
              <option value="em negociação">Em negociação</option>
              <option value="aguardando pedido">Aguardando pedido</option>
              <option value="pedido emitido">Pedido emitido</option>
              <option value="concluído">Concluído</option>
            </select>
          </div>
          <div class="form-grupo">
            <label>Data de emissão</label>
            <input type="date" id="f-data-emissao">
          </div>
          <div class="form-grupo">
            <label>Data de início</label>
            <input type="date" id="f-data-inicio">
          </div>
          <div class="form-grupo">
            <label>Término previsto</label>
            <input type="date" id="f-termino">
          </div>
        </div>
        <div class="modal-acoes">
          <button type="button" class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn btn-primario" id="btn-salvar">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal confirmação exclusão -->
  <div class="modal-overlay" id="modal-excluir">
    <div class="modal" style="max-width:400px;text-align:center;">
      <div style="font-size:2rem;margin-bottom:12px;">⚠️</div>
      <div class="modal-titulo">Excluir pedido?</div>
      <p class="txt-muted" style="margin-bottom:8px;">O pedido será movido para a aba "Excluídos" na planilha.</p>
      <p class="txt-muted">Esta ação não pode ser desfeita pelo sistema.</p>
      <div class="modal-acoes" style="justify-content:center;">
        <button class="btn btn-secundario" onclick="fecharModalExcluir()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const BADGES = {
      "em negociação":   "badge badge-neg",
      "aguardando pedido":"badge badge-ag",
      "pedido emitido":  "badge badge-em",
      "concluído":       "badge badge-ok",
    };

    let pedidos = [];
    let filtroAtivo = "todos";
    let idExcluir = null;

    // ── Init ───────────────────────────────────────────────
    if (!estaAutenticado()) location.href = "login.html";

    document.querySelectorAll(".filtro").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filtro").forEach(b => b.classList.remove("ativo"));
        btn.classList.add("ativo");
        filtroAtivo = btn.dataset.status;
        renderTabela();
      });
    });

    carregarPedidos();

    async function carregarPedidos() {
      try {
        const res = await API.pedidos();
        pedidos = res.dados || [];
        renderTabela();
      } catch (e) {
        document.getElementById("corpo-tabela").innerHTML =
          `<tr><td colspan="7" class="estado-msg" style="color:#dc2626;">Erro ao carregar: ${e.message}</td></tr>`;
      }
    }

    // ── Tabela ─────────────────────────────────────────────
    function renderTabela() {
      const busca  = (document.getElementById("busca").value || "").toLowerCase();
      const lista  = pedidos.filter(p => {
        const passaFiltro = filtroAtivo === "todos" || p.status === filtroAtivo;
        const passaBusca  = !busca ||
          (p.descricao || "").toLowerCase().includes(busca) ||
          (p.num_pedido_sap || "").toLowerCase().includes(busca);
        return passaFiltro && passaBusca;
      });

      if (!lista.length) {
        document.getElementById("corpo-tabela").innerHTML =
          `<tr><td colspan="7" class="estado-msg">Nenhum pedido encontrado.</td></tr>`;
        return;
      }

      document.getElementById("corpo-tabela").innerHTML = lista.map(p => `
        <tr>
          <td><strong>#${p.id}</strong></td>
          <td class="txt-muted">${p.num_pedido_sap || "—"}</td>
          <td>
            <a href="pedido.html?id=${p.id}" style="color:var(--cor-primaria);text-decoration:none;font-weight:500;">
              ${esc(p.descricao)}
            </a>
          </td>
          <td class="num">${fmtBRL(p.valor)}</td>
          <td><span class="${BADGES[p.status] || 'badge'}">${p.status || '—'}</span></td>
          <td class="txt-muted">${fmtData(p.termino_previsto)}</td>
          <td class="txt-direita">
            <button class="btn btn-secundario btn-sm" onclick="abrirModalEditar(${p.id})" title="Editar">✏️</button>
            <button class="btn btn-secundario btn-sm" onclick="pedirExclusao(${p.id})" title="Excluir" style="margin-left:4px;">🗑️</button>
          </td>
        </tr>
      `).join("");
    }

    // ── Modal novo / editar ────────────────────────────────
    function abrirModalNovo() {
      document.getElementById("modal-titulo").textContent = "Novo pedido";
      document.getElementById("form-pedido").reset();
      document.getElementById("f-id").value = "";
      document.getElementById("modal-pedido").classList.add("aberto");
    }

    function abrirModalEditar(id) {
      const p = pedidos.find(x => String(x.id) === String(id));
      if (!p) return;
      document.getElementById("modal-titulo").textContent = "Editar pedido";
      document.getElementById("f-id").value            = p.id;
      document.getElementById("f-descricao").value     = p.descricao || "";
      document.getElementById("f-num-sap").value       = p.num_pedido_sap || "";
      document.getElementById("f-valor").value         = p.valor || "";
      document.getElementById("f-retencao").value      = p.perc_retencao || "";
      document.getElementById("f-status").value        = p.status || "em negociação";
      document.getElementById("f-data-emissao").value  = isoData(p.data_emissao);
      document.getElementById("f-data-inicio").value   = isoData(p.data_inicio);
      document.getElementById("f-termino").value       = isoData(p.termino_previsto);
      document.getElementById("modal-pedido").classList.add("aberto");
    }

    function fecharModal() {
      document.getElementById("modal-pedido").classList.remove("aberto");
    }

    async function salvarPedido(e) {
      e.preventDefault();
      const btn = document.getElementById("btn-salvar");
      btn.disabled = true;
      btn.textContent = "Salvando…";
      try {
        const dados = {
          id:              document.getElementById("f-id").value || null,
          descricao:       document.getElementById("f-descricao").value,
          num_pedido_sap:  document.getElementById("f-num-sap").value,
          valor:           parseFloat(document.getElementById("f-valor").value) || 0,
          perc_retencao:   parseFloat(document.getElementById("f-retencao").value) || 0,
          status:          document.getElementById("f-status").value,
          data_emissao:    document.getElementById("f-data-emissao").value,
          data_inicio:     document.getElementById("f-data-inicio").value,
          termino_previsto:document.getElementById("f-termino").value,
        };
        await API.salvarPedido(dados);
        fecharModal();
        await carregarPedidos();
      } catch (err) {
        alert("Erro ao salvar: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Salvar";
      }
    }

    // ── Exclusão ───────────────────────────────────────────
    function pedirExclusao(id) {
      idExcluir = id;
      document.getElementById("modal-excluir").classList.add("aberto");
    }

    function fecharModalExcluir() {
      idExcluir = null;
      document.getElementById("modal-excluir").classList.remove("aberto");
    }

    async function confirmarExclusao() {
      if (!idExcluir) return;
      try {
        await API.excluirPedido(idExcluir);
        fecharModalExcluir();
        await carregarPedidos();
      } catch (err) {
        alert("Erro ao excluir: " + err.message);
      }
    }

    // ── Sair ───────────────────────────────────────────────
    function sair(e) {
      e.preventDefault();
      clearToken();
      location.href = "login.html";
    }

    // ── Utilitários ────────────────────────────────────────
    function fmtBRL(v) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number(v) || 0);
    }
    function fmtData(v) {
      if (!v) return "—";
      const d = new Date(v);
      if (isNaN(d)) return v;
      return d.toLocaleDateString("pt-BR");
    }
    function isoData(v) {
      if (!v) return "";
      const d = new Date(v);
      if (isNaN(d)) return "";
      return d.toISOString().slice(0, 10);
    }
    function esc(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Fechar modal clicando fora
    document.getElementById("modal-pedido").addEventListener("click", function(e) {
      if (e.target === this) fecharModal();
    });
    document.getElementById("modal-excluir").addEventListener("click", function(e) {
      if (e.target === this) fecharModalExcluir();
    });
  </script>
</body>
</html>
