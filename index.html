<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DC Pecém</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Header brand ───────────────────────── */
    .brand-logo {
      width: 30px; height: 30px;
      background: white;
      color: var(--cor-primaria);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.1rem;
      letter-spacing: -0.5px;
      font-family: Georgia, serif;
      flex-shrink: 0;
    }

    /* ── Nav com ícones ─────────────────────── */
    nav a { display: inline-flex; align-items: center; gap: 7px; }
    nav a svg { flex-shrink: 0; opacity: 0.85; }

    /* ── Título da página ───────────────────── */
    .page-titulo {
      font-size: 1.2rem; font-weight: 700; color: var(--cor-primaria);
      margin-bottom: 3px;
    }
    .page-titulo + hr {
      border: none; border-top: 2px solid var(--cor-acento);
      width: 32px; margin: 0 0 14px;
    }

    /* ── Cards de métrica com ícone ─────────── */
    .metricas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .metrica {
      background: white;
      border-radius: var(--raio);
      border: 1px solid var(--cor-borda);
      box-shadow: var(--sombra);
      padding: 11px 14px;
      display: flex; align-items: center; gap: 11px;
    }
    .metrica-icon {
      width: 38px; height: 38px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .metrica-icon svg { width: 19px; height: 19px; }
    .metrica-icon.azul    { background: #DBEAFE; color: #1D4ED8; }
    .metrica-icon.verde   { background: #DCFCE7; color: #15803D; }
    .metrica-icon.roxo    { background: #EDE9FE; color: #6D28D9; }
    .metrica-icon.laranja { background: #FFEDD5; color: #C2410C; }
    .metrica-corpo { flex: 1; min-width: 0; }
    .metrica-titulo {
      font-size: 0.7rem; font-weight: 600;
      color: var(--cor-texto-m);
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 2px;
    }
    .metrica-valor {
      font-size: 1.05rem; font-weight: 700;
      color: var(--cor-texto);
      line-height: 1.15;
    }
    .metrica-sub {
      font-size: 0.7rem; color: var(--cor-texto-m);
      margin-top: 2px;
    }
    .metrica-nota {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; color: #b45309;
      background: #fef3c7; border: 1px solid #fde68a;
      border-radius: 4px; padding: 2px 6px;
      margin-top: 5px; cursor: default;
    }
    .metrica-nota svg { flex-shrink: 0; }
    .metrica-pct {
      display: inline-block;
      background: var(--cor-acento); color: white;
      border-radius: 3px;
      padding: 0 5px;
      font-weight: 600; font-size: 0.68rem;
      margin-left: 3px;
    }

    /* ── Grid 3 colunas: resumo + status + alertas ─ */
    .grid-3 {
      display: grid;
      grid-template-columns: 0.85fr 1.4fr 1.25fr;
      gap: 12px; margin-bottom: 14px;
    }
    @media (max-width: 980px) { .grid-3 { grid-template-columns: 1fr; } }

    .secao-titulo {
      font-size: 0.72rem; font-weight: 600;
      color: var(--cor-texto-m);
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 11px;
      display: flex; align-items: center; gap: 6px;
    }
    .secao-titulo svg { color: var(--cor-acento); }

    /* ── Donut Resumo Geral ─────────────────── */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; }
    .donut-info {
      text-align: center;
      font-size: 0.72rem; color: var(--cor-texto-m);
      margin-top: 10px;
      line-height: 1.4;
    }
    .donut-info strong { display: block; color: var(--cor-texto); font-weight: 700; font-size: 0.88rem; margin: 2px 0; }

    /* ── Pedidos por status ─────────────────── */
    .status-linha { margin-bottom: 10px; }
    .status-linha:last-child { margin-bottom: 0; }
    .status-linha .label { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 3px; }
    .status-linha .label strong { font-weight: 500; display:flex; align-items:center; gap:6px; }
    .status-linha .label strong::before { content: ""; width: 7px; height: 7px; border-radius: 50%; }
    .status-linha[data-st="em negociação"]    .label strong::before { background: #888780; }
    .status-linha[data-st="aguardando pedido"] .label strong::before { background: #EF9F27; }
    .status-linha[data-st="pedido emitido"]   .label strong::before { background: #378ADD; }
    .status-linha[data-st="concluído"]         .label strong::before { background: #1D9E75; }
    .status-linha .label span  { color: var(--cor-texto-m); font-size: 0.72rem; }
    .barra-status { height: 6px; background: var(--cor-borda); border-radius: 3px; overflow: hidden; }
    .barra-status div { height: 6px; border-radius: 3px; transition: width 0.4s ease; }

    /* ── Alertas ───────────────────────────── */
    .alertas-lista { display: flex; flex-direction: column; gap: 5px; max-height: 320px; overflow-y: auto; padding-right: 4px; }
    .alerta-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 5px;
      font-size: 0.76rem;
    }
    .alerta-am { background: #FEF7E0; color: #92600A; }
    .alerta-vm { background: #FEE2E2; color: #991B1B; }
    .alerta-az { background: #DBEAFE; color: #1E40AF; }
    .alerta-item .ic { flex-shrink: 0; }
    .alerta-item .texto { flex: 1; }
    .alerta-item .texto strong { font-weight: 600; }
    .alerta-item a {
      color: inherit; font-weight: 500; font-size: 0.78rem;
      white-space: nowrap; text-decoration: underline;
      flex-shrink: 0;
    }

    /* ── Ranking ───────────────────────────── */
    .ranking-row { cursor: pointer; transition: background 0.1s; }
    .ranking-row:hover td { background: var(--cor-fundo) !important; }

    /* ── Footer ────────────────────────────── */
    .data-footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--cor-texto-m);
      margin-top: 18px;
      padding-bottom: 10px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E3A5F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DC Pecém">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="pagina">

  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="brand-logo">E</div>
      <h1>DC Pecém — Contratos</h1>
    </div>
    <button onclick="carregarDashboard()"
            style="background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);color:white;padding:7px 14px;border-radius:var(--raio);cursor:pointer;font-size:0.85rem;font-family:inherit;display:inline-flex;align-items:center;gap:6px;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8a6 6 0 1 1-1.76-4.24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="14,2 14,5 11,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Atualizar
    </button>
  </header>

  <nav>
    <a href="index.html" class="ativo">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/></svg>
      Dashboard
    </a>
    <a href="pedidos.html">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="1.5" width="9" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/><line x1="5.5" y1="5.5" x2="9.5" y2="5.5" stroke="currentColor" stroke-width="1.2"/><line x1="5.5" y1="8" x2="9.5" y2="8" stroke="currentColor" stroke-width="1.2"/><line x1="5.5" y1="10.5" x2="8" y2="10.5" stroke="currentColor" stroke-width="1.2"/></svg>
      Pedidos
    </a>
    <a href="avanco.html">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><polyline points="6,3 11,8 6,13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      Avançar
    </a>
    <a href="fat-direto.html">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="4" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><line x1="1.5" y1="7.5" x2="14.5" y2="7.5" stroke="currentColor" stroke-width="1.4"/></svg>
      Fat. Direto
    </a>
    <a href="mapa-mensal.html">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.4"/><line x1="1.5" y1="6" x2="14.5" y2="6" stroke="currentColor" stroke-width="1.4"/><line x1="6" y1="6" x2="6" y2="13.5" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="6" x2="10" y2="13.5" stroke="currentColor" stroke-width="1.2"/></svg>
      Mapa Mensal
    </a>
    <a href="importacao.html">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><polyline points="4,6 8,2 12,6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="8" y1="2" x2="8" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2 12v1.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Importar
    </a>
    <a href="#" onclick="sair(event)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2.5H3.5A1.5 1.5 0 0 0 2 4v8a1.5 1.5 0 0 0 1.5 1.5H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><polyline points="10,5 13.5,8 10,11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="13.5" y1="8" x2="6.5" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Sair
    </a>
  </nav>

  <main id="conteudo">
    <div class="estado-msg">Carregando…</div>
  </main>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    if (!estaAutenticado()) location.href = "login.html";

    const COR_STATUS = {
      "em negociação":    "#888780",
      "aguardando pedido":"#EF9F27",
      "pedido emitido":   "#378ADD",
      "concluído":        "#1D9E75",
    };

    const TIPO_ALERTA = {
      medicao_parada:    { cls: "alerta-am", label: "Medição parada" },
      glosa_alta:        { cls: "alerta-vm", label: "Glosa alta" },
      retencao_pendente: { cls: "alerta-az", label: "Retenção" },
    };

    // SVG icons reutilizáveis
    const iDoc    = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="2.5" width="14" height="19" rx="2" stroke="currentColor" stroke-width="1.8"/><line x1="8.5" y1="8" x2="15.5" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8.5" y1="12" x2="15.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8.5" y1="16" x2="13" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    const iBars   = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="4" height="8" rx="1" fill="currentColor"/><rect x="10" y="8" width="4" height="13" rx="1" fill="currentColor"/><rect x="17" y="4" width="4" height="17" rx="1" fill="currentColor"/></svg>`;
    const iTrend  = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><polyline points="3,17 9,11 13,15 21,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="15,7 21,7 21,13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const iPie    = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 12V3" stroke="currentColor" stroke-width="1.8"/><path d="M12 12L20 16" stroke="currentColor" stroke-width="1.8"/></svg>`;
    const iAlerta = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L1.5 13h13L8 1.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><line x1="8" y1="6.5" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.7" fill="currentColor"/></svg>`;
    const iChart  = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><polyline points="1.5,13.5 5,8 9,10.5 14.5,3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const iList   = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><line x1="3" y1="4.5" x2="13" y2="4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="3" y1="11.5" x2="13" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
    const iClock  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><polyline points="8,5 8,8 10.5,8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const iTrophy = `<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 2h6v4a3 3 0 0 1-6 0V2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M11 3h2.5v1.5A2.5 2.5 0 0 1 11 7" stroke="currentColor" stroke-width="1.4"/><path d="M5 3H2.5v1.5A2.5 2.5 0 0 0 5 7" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="9" x2="8" y2="12" stroke="currentColor" stroke-width="1.4"/><line x1="5" y1="13.5" x2="11" y2="13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;

    carregarDashboard();

    async function carregarDashboard() {
      document.getElementById("conteudo").innerHTML = `<div class="estado-msg">Carregando…</div>`;
      try {
        const res = await API.dashboard();
        renderDashboard(res);
      } catch (e) {
        document.getElementById("conteudo").innerHTML =
          `<div class="estado-msg" style="color:#dc2626;">Erro ao carregar: ${e.message}</div>`;
      }
    }

    function renderDashboard({ cartoes, porStatus, ranking, alertas }) {
      const maxValorStatus = porStatus.reduce((s, x) => s + x.valor, 0) || 1;
      const pctMedido      = cartoes.contratado > 0 ? (cartoes.medido / cartoes.contratado * 100) : 0;
      const pctFat         = cartoes.medido     > 0 ? (cartoes.faturadoLiquido / cartoes.medido * 100) : 0;

      const iWarn = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2L14.5 13.5H1.5L8 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><line x1="8" y1="7" x2="8" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="12" r="0.6" fill="currentColor"/></svg>`;
      const notaProvisorio = cartoes.executadoProvisorio > 0
        ? { icone: iWarn,
            texto: `inc. ${fmtBRL(cartoes.executadoProvisorio)} provisório`,
            titulo: `${fmtBRL(cartoes.executadoProvisorio)} referente a contratos sem valor definido (orçamento pendente)` }
        : null;

      const htmlMetricas = `
        <div class="metricas-grid">
          ${metrica(iDoc,   "azul",    "Executado",        cartoes.executado,        cartoes.contratado, notaProvisorio)}
          ${metrica(iBars,  "verde",   "Medido",           cartoes.medido,           cartoes.contratado)}
          ${metrica(iTrend, "roxo",    "Faturado líquido", cartoes.faturadoLiquido,  cartoes.medido)}
          ${metrica(iPie,   "laranja", "Saldo a medir",    cartoes.saldoMedir)}
        </div>`;

      const htmlResumo = `
        <div class="card" style="padding:14px 16px;">
          <div class="secao-titulo">Resumo geral</div>
          <div class="donut-wrap">
            ${donutGauge(pctMedido)}
            <div class="donut-info">
              Medido sobre o contratado
              <strong>${fmtBRL(cartoes.medido)}</strong>
              de ${fmtBRL(cartoes.contratado)}
            </div>
          </div>
        </div>`;

      const totalQtd   = porStatus.reduce((s, x) => s + x.qtd, 0);
      const totalValor = porStatus.reduce((s, x) => s + x.valor, 0);
      const htmlStatus = `
        <div class="card" style="padding:14px 16px;">
          <div class="secao-titulo">${iChart} Pedidos por status</div>
          ${porStatus.map(s => `
            <div class="status-linha" data-st="${s.status}">
              <div class="label">
                <strong>${s.status}</strong>
                <span>${s.qtd} pedido${s.qtd !== 1 ? "s" : ""} · ${fmtBRL(s.valor)}</span>
              </div>
              <div class="barra-status">
                <div style="width:${s.valor > 0 ? ((s.valor / maxValorStatus) * 100).toFixed(1) : 0}%;background:${COR_STATUS[s.status] || "#888"};"></div>
              </div>
            </div>`).join("")}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--cor-borda);font-size:0.8rem;">
            <strong style="color:var(--cor-primaria);text-transform:uppercase;letter-spacing:0.4px;font-size:0.72rem;">Total</strong>
            <span style="color:var(--cor-texto);"><strong>${totalQtd}</strong> pedido${totalQtd !== 1 ? "s" : ""} · <strong style="color:var(--cor-primaria);">${fmtBRL(totalValor)}</strong></span>
          </div>
        </div>`;

      const htmlAlertas = `
        <div class="card" style="padding:14px 16px;">
          <div class="secao-titulo">${iAlerta} Alertas ${alertas.length ? `<span style="margin-left:auto;background:var(--cor-acento);color:white;border-radius:10px;padding:1px 8px;font-size:0.7rem;">${alertas.length}</span>` : ""}</div>
          ${!alertas.length
            ? `<div class="txt-muted" style="font-size:0.88rem;padding:8px 0;">Nenhum alerta no momento.</div>`
            : `<div class="alertas-lista">${alertas.map(a => {
                const cfg = TIPO_ALERTA[a.tipo] || { cls: "alerta-az", label: a.tipo };
                const texto = a.descricao
                  ? `<strong>${esc(a.descricao)}</strong> — ${esc(a.detalhe)}`
                  : esc(a.detalhe);
                const link = a.pedido_id
                  ? `<a href="pedido.html?id=${a.pedido_id}">Ver pedido</a>`
                  : "";
                return `<div class="alerta-item ${cfg.cls}"><span class="ic">${iAlerta}</span><span class="texto">${texto}</span>${link}</div>`;
              }).join("")}</div>`}
        </div>`;

      const maxSaldo = Math.max(...ranking.map(r => r.saldoFaturar), 1);
      const htmlRanking = `
        <div class="card" style="padding:0;overflow:hidden;">
          <div style="padding:11px 16px;border-bottom:1px solid var(--cor-borda);">
            <div class="secao-titulo" style="margin:0;">${iTrophy} Ranking — saldo a faturar</div>
          </div>
          ${!ranking.length
            ? `<div class="estado-msg">Nenhum pedido com saldo a faturar.</div>`
            : `<div class="tabela-wrap">
                <table class="rank-tbl">
                  <thead>
                    <tr>
                      <th style="width:48px;">Pos</th>
                      <th style="width:60px;">ID</th>
                      <th>Descrição</th>
                      <th class="num" style="width:110px;">Medido</th>
                      <th class="num" style="width:110px;">Faturado</th>
                      <th class="num" style="width:130px;">Saldo a faturar</th>
                      <th style="width:90px;">% do líder</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${ranking.map((r, i) => {
                      const pctLider = (r.saldoFaturar / maxSaldo * 100);
                      const medalha = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i + 1}º`;
                      return `
                      <tr class="ranking-row" onclick="location.href='pedido.html?id=${r.id}'">
                        <td style="font-weight:600;color:var(--cor-texto-m);font-size:0.78rem;">${medalha}</td>
                        <td><strong>#${r.id}</strong></td>
                        <td>${esc(r.descricao)}</td>
                        <td class="num txt-muted">${fmtBRL(r.medido)}</td>
                        <td class="num txt-muted">${fmtBRL(r.faturadoBruto)}</td>
                        <td class="num" style="font-weight:600;color:var(--cor-primaria);">${fmtBRL(r.saldoFaturar)}</td>
                        <td>
                          <div style="display:flex;align-items:center;gap:6px;">
                            <div style="flex:1;height:5px;background:var(--cor-borda);border-radius:3px;overflow:hidden;">
                              <div style="height:5px;background:var(--cor-acento);width:${pctLider.toFixed(1)}%;border-radius:3px;"></div>
                            </div>
                            <span style="font-size:0.7rem;color:var(--cor-texto-m);min-width:30px;text-align:right;">${pctLider.toFixed(0)}%</span>
                          </div>
                        </td>
                      </tr>`;
                    }).join("")}
                  </tbody>
                </table>
              </div>`}
        </div>`;

      const periodoRef = periodoMesAnterior();
      const htmlFooter = `<div class="data-footer">${iClock} Dados atualizados em ${periodoRef}</div>`;

      document.getElementById("conteudo").innerHTML =
        `<div class="page-titulo">Dashboard</div><hr>` +
        htmlMetricas +
        `<div class="grid-3">${htmlResumo}${htmlStatus}${htmlAlertas}</div>` +
        htmlRanking +
        htmlFooter;
    }

    function metrica(icon, cor, titulo, valor, base, nota) {
      const pct = base > 0
        ? `<div class="metrica-sub">de ${fmtBRL(base)} <span class="metrica-pct">${((valor / base) * 100).toFixed(1)}%</span></div>`
        : "";
      const notaHtml = nota
        ? `<div class="metrica-nota" title="${nota.titulo}">${nota.icone} ${nota.texto}</div>`
        : "";
      return `
        <div class="metrica">
          <div class="metrica-icon ${cor}">${icon}</div>
          <div class="metrica-corpo">
            <div class="metrica-titulo">${titulo}</div>
            <div class="metrica-valor">${fmtBRL(valor)}</div>
            ${pct}
            ${notaHtml}
          </div>
        </div>`;
    }

    function donutGauge(pct, size=110) {
      const clamped = Math.max(0, Math.min(100, pct));
      const r = 42, cx = 60, cy = 60;
      const circ  = 2 * Math.PI * r;
      const filled = circ * (clamped / 100);
      const cor = "var(--cor-acento)";
      return `
        <svg width="${size}" height="${size}" viewBox="0 0 120 120">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E8EDF2" stroke-width="10"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${cor}" stroke-width="10"
            stroke-dasharray="${filled.toFixed(1)} ${circ.toFixed(1)}"
            stroke-linecap="round"
            transform="rotate(-90 ${cx} ${cy})"/>
          <text x="${cx}" y="${cy + 5}" text-anchor="middle"
            font-size="20" font-weight="700" fill="${cor}">${clamped.toFixed(1).replace(".", ",")}%</text>
        </svg>`;
    }

    function periodoMesAnterior() {
      const d = new Date();
      const m = new Date(d.getFullYear(), d.getMonth() - 1, 1);
      return String(m.getMonth() + 1).padStart(2, "0") + "/" + m.getFullYear();
    }

    function sair(e) {
      e.preventDefault();
      clearToken();
      location.href = "login.html";
    }

    function fmtBRL(v) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number(v) || 0);
    }
    function esc(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
