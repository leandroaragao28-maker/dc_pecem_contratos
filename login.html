<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Pecém — Contratos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .caixa {
      background: white;
      border-radius: var(--raio-lg);
      border: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px 44px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .icone-login {
      width: 52px; height: 52px;
      background: var(--cor-primaria);
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo { font-size: 1.2rem; font-weight: 700; color: var(--cor-texto); margin-bottom: 4px; }
    .sub  { font-size: 0.88rem; color: var(--cor-texto-m); margin-bottom: 28px; }
    .caixa input { text-align: center; letter-spacing: 2px; }
    .caixa .btn  { width: 100%; justify-content: center; margin-top: 8px; padding: 10px; }
    .erro { color: #dc2626; font-size: 0.83rem; margin-top: 10px; min-height: 20px; }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1E3A5F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DC Pecém">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div class="caixa">
    <div class="icone-login">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="logo">DC Pecém — Contratos</div>
    <div class="sub">Digite o token de acesso para continuar</div>
    <div class="form-grupo">
      <input type="password" id="token" placeholder="••••••••••••" autocomplete="off">
    </div>
    <button class="btn btn-primario" onclick="entrar()">Entrar</button>
    <div class="erro" id="msg-erro"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    if (estaAutenticado()) location.href = "index.html";

    document.getElementById("token").addEventListener("keydown", e => {
      if (e.key === "Enter") entrar();
    });

    async function entrar() {
      const token = document.getElementById("token").value.trim();
      if (!token) return;
      setToken(token);
      try {
        const res = await API.dashboard();
        if (res) location.href = "index.html";
      } catch {
        clearToken();
        document.getElementById("msg-erro").textContent = "Token inválido. Tente novamente.";
      }
    }
  </script>
  <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
